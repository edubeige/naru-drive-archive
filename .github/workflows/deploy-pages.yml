name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://script.google.com/macros/s/AKfycbzONOmQfiiuOEn7_jeOChPkzS-_qAsuFfMDreUs3o43OLOF6e8GezyDny8yqtL_TUBR6Q/exec' }}
      VITE_EVENTS_API_URL: ${{ vars.VITE_EVENTS_API_URL || 'https://script.google.com/macros/s/AKfycbxQIRBA_Qsu_H1QTEIAOdgPT1K9f4fVwfj738ddToR6WwJGsnR6wDhwV9whVLROk1_X8g/exec' }}
      VITE_RESERVATION_API_URL: ${{ vars.VITE_RESERVATION_API_URL || 'https://script.google.com/macros/s/AKfycbzEKcGPQim0xX3YAbWVclAE9LaRvlq--TA-fDLBUUrLXFf9YeZjsdzt-Dbj7hP1RPQf/exec' }}
      VITE_ENABLE_MATERIALS_UPLOAD: ${{ vars.VITE_ENABLE_MATERIALS_UPLOAD || 'false' }}
      VITE_MATERIALS_UPLOAD_API_URL: ${{ vars.VITE_MATERIALS_UPLOAD_API_URL || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

